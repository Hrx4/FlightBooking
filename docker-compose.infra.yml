services:
  postgres:
    image: postgres:16
    container_name: flightbooking-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
      TZ: Asia/Kolkata
      PGTZ: Asia/Kolkata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: flightbooking-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: password
    ports:
      - "5050:80"
    depends_on:
      - postgres
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0

    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server kafka:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 5

  kafbat-ui:
    container_name: kafbat-ui
    image: ghcr.io/kafbat/kafka-ui:latest
    ports:
      - "8090:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: 'true'
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      - kafka

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9099:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  auth-service:
    build:
      context: ./AuthService

    container_name: auth-service

    ports:
      - "8081:8081"

    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auth_service_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: password
      SERVER_PORT: 8081

  booking-service:
    build:
      context: ./BookingService

    container_name: booking-service
    ports:
      - "8082:8082"

    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/booking_service_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_GRPC_CLIENT_CHANNELS_INVENTORY-SERVICE_ADDRESS: dns:///inventory-service:9091
      SPRING_GRPC_CLIENT_CHANNELS_INVENTORY-SERVICE_NEGOTIATION-TYPE: plaintext
      SERVER_PORT: 8082   
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092

  inventory-service:
    build:
      context: ./InventoryService

    container_name: inventory-service

    ports:
      - "8083:8083"
      - "9091:9091"

    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/inventory_service_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: password
      SERVER_PORT: 8083   
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092

  payment-service:
    build:
      context: ./PaymentService

    container_name: payment-service

    ports:
      - "8084:8084"

    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/payment_service_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: password
      SERVER_PORT: 8084   
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092

  jenkins:
    image: jenkins/jenkins:lts-jdk21

    container_name: jenkins

    privileged: true

    ports:
      - "8088:8080"
      - "50000:50000"

    volumes:
      - jenkins_home:/var/jenkins_home

volumes:
  postgres_data:
  jenkins_home: