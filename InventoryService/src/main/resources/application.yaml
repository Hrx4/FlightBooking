server:
  port: 8082

grpc:
  server:
    port: 9091

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/inventory_service_db?TimeZone=UTC
    username: admin
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
