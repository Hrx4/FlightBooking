server:
  port: 8084

grpc:
  server:
    port: 9092

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/payment_service_db?TimeZone=UTC
    username: admin
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect