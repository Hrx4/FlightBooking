server:
  port: 8081

grpc:
  server:
    port: 9090

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

resilience4j:

  retry:

    instances:

      paymentRetry:

        max-attempts: 3

        wait-duration: 2s

      inventoryRetry:

        max-attempts: 3

        wait-duration: 1s

  circuitbreaker:

    instances:

      paymentCircuit:

        sliding-window-size: 10

        failure-rate-threshold: 50

        wait-duration-in-open-state: 30s

      inventoryCircuit:

        sliding-window-size: 10

        failure-rate-threshold: 50

        wait-duration-in-open-state: 30s

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/booking_service_db?TimeZone=UTC
    username: admin
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.type.mapping: "paymentFailed:org.example.sharedevents.PaymentFailedEvent,paymentCompleted:org.example.sharedevents.PaymentSuccessEvent"

    consumer:
      group-id: booking-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "org.example.sharedevents"
        spring.json.type.mapping: "paymentFailed:org.example.sharedevents.PaymentFailedEvent,paymentCompleted:org.example.sharedevents.PaymentSuccessEvent"